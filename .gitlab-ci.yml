# GitLab Secret Detection pipeline
# Uses GitLab's built-in Secret Detection scanner (available on all tiers).
# Runs automatically on every push to main.
#
# Results appear under:
#   Security > Vulnerability Report  (if GitLab Ultimate)
#   Pipeline > secret_detection job > Artifacts > gl-secret-detection-report.json  (all tiers)

include:
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_HISTORIC_SCAN: "true"   # scan full git history, not just the diff
